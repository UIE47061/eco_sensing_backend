name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main   # 監聽 main 分支推送時觸發

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 獲取完整的 git 歷史，而不是淺層克隆

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is missing"
            exit 1
          fi

          if [ -z "$HF_SPACE_ID" ]; then
            echo "HF_SPACE_ID secret is missing. Expected format: username/space-name"
            exit 1
          fi

          HF_STATUS_CODE=$(curl --silent --show-error \
            --output /dev/null \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer $HF_TOKEN" \
            "https://huggingface.co/api/spaces/$HF_SPACE_ID")

          if [ "$HF_STATUS_CODE" = "401" ] || [ "$HF_STATUS_CODE" = "403" ] || [ "$HF_STATUS_CODE" = "404" ]; then
            echo "Cannot access Hugging Face Space. Check HF_SPACE_ID, Space existence, and token permissions. HTTP status: $HF_STATUS_CODE"
            exit 1
          fi

          if [ "$HF_STATUS_CODE" = "429" ]; then
            echo "Hugging Face API rate limited the preflight check. Continuing to git push."
          elif [ "$HF_STATUS_CODE" != "200" ]; then
            echo "Hugging Face API preflight returned HTTP status: $HF_STATUS_CODE. Continuing to git push."
          fi

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 為 Hugging Face 準備專門的 README
          cp README_HF.md README.md
          git add README.md
          git commit -m "Update README for Hugging Face deployment" || echo "No changes to commit"
          
          git remote remove space || true
          git remote add space https://oauth2:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_ID
          git push space main:main --force
